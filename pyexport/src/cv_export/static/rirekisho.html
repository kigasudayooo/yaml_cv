<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>履歴書の作成 - yaml_cv</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="/static/sheet.css">
</head>
<body class="sheet-body">
<nav><a href="/">トップ</a><a href="/shokumu">職務経歴書の作成</a></nav>
<h1>履歴書の作成</h1>
<p class="hint">
  下の用紙に直接入力してください。入力内容はこのブラウザ内にのみ自動保存されます（サーバには送信・保存されません）。
  生成ボタンを押したときだけ、その時点の入力内容が変換のためサーバへ送られます。
</p>

<div class="toolbar">
  <label style="margin:0;">
    data.yaml を読み込む
    <input type="file" id="import-file" accept=".yaml,.yml">
  </label>
  <button id="btn-import" type="button">読み込んでフォームに反映</button>
  <button id="btn-export-yaml" type="button">data.yaml をローカルに保存(ignore/)</button>
  <button id="btn-clear" type="button" class="danger">入力をクリア</button>
  <span class="status" id="import-status"></span>
</div>

<form id="rirekisho-form">
<div class="sheet">

  <div class="sheet-header">
    <span class="sheet-title">履　歴　書</span>
    <span class="sheet-date">
      <input type="text" name="date" placeholder="2026年 7月 11日現在" class="cell-input date-input">
    </span>
  </div>

  <div class="sheet-top">
    <table class="doc-table basic-table">
      <tr>
        <td class="label-cell">ふりがな</td>
        <td colspan="3"><input type="text" name="name_kana" class="cell-input"></td>
      </tr>
      <tr>
        <td class="label-cell">氏　名</td>
        <td colspan="3"><input type="text" name="name" class="cell-input name-input"></td>
      </tr>
      <tr>
        <td class="label-cell">生年月日</td>
        <td><input type="text" name="birth_day" placeholder="1990年1月1日 (満36歳)" class="cell-input"></td>
        <td class="label-cell narrow-label">性別</td>
        <td><input type="text" name="gender" class="cell-input"></td>
      </tr>
      <tr>
        <td class="label-cell">携帯電話</td>
        <td><input type="text" name="cell_phone" class="cell-input"></td>
        <td class="label-cell narrow-label">E-MAIL</td>
        <td><input type="text" name="email" class="cell-input"></td>
      </tr>
    </table>

    <div class="photo-box">
      <label for="photo-file" class="photo-label">
        <img id="photo-preview" alt="証明写真プレビュー" hidden>
        <span id="photo-placeholder">写真を貼る位置<br>縦36〜40mm<br>横24〜30mm</span>
      </label>
      <input type="file" id="photo-file" accept="image/*" hidden>
    </div>
  </div>

  <table class="doc-table address-table">
    <tr>
      <td class="label-cell">ふりがな</td>
      <td colspan="3"><input type="text" name="address_kana" class="cell-input"></td>
    </tr>
    <tr>
      <td class="label-cell">現住所</td>
      <td class="narrow-label">〒<input type="text" name="address_zip" class="cell-input zip-input"></td>
      <td colspan="2"><input type="text" name="address" class="cell-input"></td>
    </tr>
    <tr>
      <td class="label-cell">電話</td>
      <td><input type="text" name="tel" class="cell-input"></td>
      <td class="label-cell narrow-label">FAX</td>
      <td><input type="text" name="fax" class="cell-input"></td>
    </tr>
    <tr>
      <td class="label-cell">ふりがな</td>
      <td colspan="3"><input type="text" name="address_kana2" class="cell-input"></td>
    </tr>
    <tr>
      <td class="label-cell">連絡先</td>
      <td class="narrow-label">〒<input type="text" name="address_zip2" class="cell-input zip-input"></td>
      <td colspan="2"><input type="text" name="address2" class="cell-input"></td>
    </tr>
    <tr>
      <td class="label-cell">電話</td>
      <td><input type="text" name="tel2" class="cell-input"></td>
      <td class="label-cell narrow-label">FAX</td>
      <td><input type="text" name="fax2" class="cell-input"></td>
    </tr>
  </table>

  <div class="section-box">
    <div class="section-caption">学歴・職歴（各項目ごとにまとめて書く）</div>
    <table class="doc-table history-table">
      <colgroup>
        <col class="col-year"><col class="col-month"><col>
      </colgroup>
      <tr class="group-label-row">
        <td colspan="3">学歴</td>
      </tr>
      <tbody id="education-rows"></tbody>
      <tr class="group-label-row">
        <td colspan="3">職歴</td>
      </tr>
      <tbody id="experience-rows"></tbody>
      <tr class="final-row">
        <td colspan="3">以上</td>
      </tr>
    </table>
    <div class="row-add-buttons">
      <button type="button" class="small" data-add-row="education">+ 学歴の行を追加</button>
      <button type="button" class="small" data-add-row="experience">+ 職歴の行を追加</button>
    </div>
  </div>

  <div class="section-box">
    <div class="section-caption">免許・資格</div>
    <table class="doc-table history-table">
      <colgroup>
        <col class="col-year"><col class="col-month"><col>
      </colgroup>
      <tbody id="licences-rows"></tbody>
    </table>
    <div class="row-add-buttons">
      <button type="button" class="small" data-add-row="licences">+ 資格の行を追加</button>
    </div>
  </div>

  <table class="doc-table misc-table">
    <tr>
      <td class="label-cell">通勤時間</td>
      <td><input type="text" name="commuting_time" class="cell-input"></td>
      <td class="label-cell">扶養家族<br><span class="tiny">(配偶者を除く)</span></td>
      <td><input type="text" name="dependents" class="cell-input"></td>
      <td class="label-cell">配偶者</td>
      <td><input type="text" name="spouse" class="cell-input"></td>
      <td class="label-cell">配偶者の<br>扶養義務</td>
      <td><input type="text" name="supporting_spouse" class="cell-input"></td>
    </tr>
  </table>

  <div class="section-box">
    <div class="section-caption">趣味・特技</div>
    <textarea name="hobby" class="cell-input box-textarea"></textarea>
  </div>

  <div class="section-box">
    <div class="section-caption">志望動機</div>
    <textarea name="motivation" class="cell-input box-textarea"></textarea>
  </div>

  <div class="section-box">
    <div class="section-caption">本人希望記入欄</div>
    <textarea name="request" class="cell-input box-textarea"></textarea>
  </div>

</div>

<section class="output-section">
  <h2>出力</h2>
  <label>出力形式
    <select name="format">
      <option value="pdf">PDF</option>
      <option value="excel">Excel (.xlsx)</option>
      <option value="word">Word (.docx)</option>
    </select>
  </label>
  <button type="submit" class="primary">履歴書を生成してダウンロード</button>
  <span class="status" id="generate-status"></span>
</section>
</form>

<template id="history-row-template">
  <tr data-history-row>
    <td><input type="text" data-field="year" class="cell-input narrow-cell" placeholder="年"></td>
    <td><input type="text" data-field="month" class="cell-input narrow-cell" placeholder="月"></td>
    <td class="value-cell">
      <input type="text" data-field="value" class="cell-input" placeholder="内容">
      <button type="button" class="small danger row-remove" data-remove-row>削除</button>
    </td>
  </tr>
</template>

<script src="/static/common.js"></script>
<script src="/static/rirekisho.js"></script>
</body>
</html>
