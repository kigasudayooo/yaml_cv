<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>履歴書の作成 - yaml_cv</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav><a href="/">トップ</a><a href="/shokumu">職務経歴書の作成</a></nav>
<h1>履歴書の作成</h1>
<p class="hint">
  入力内容はこのブラウザ内にのみ自動保存されます（サーバには送信・保存されません）。
  生成ボタンを押したときだけ、その時点の入力内容が変換のためサーバへ送られます。
</p>

<div class="toolbar">
  <label style="margin:0;">
    data.yaml を読み込む
    <input type="file" id="import-file" accept=".yaml,.yml">
  </label>
  <button id="btn-import" type="button">読み込んでフォームに反映</button>
  <button id="btn-export-yaml" type="button">data.yaml として書き出す</button>
  <button id="btn-clear" type="button" class="danger">入力をクリア</button>
  <span class="status" id="import-status"></span>
</div>

<form id="rirekisho-form">
  <section>
    <h2>基本情報</h2>
    <label>作成日 <input type="text" name="date" placeholder="2026年 7月 11日現在"></label>
    <label>ふりがな <input type="text" name="name_kana"></label>
    <label>氏名 <input type="text" name="name"></label>
    <label>生年月日 <input type="text" name="birth_day" placeholder="1990年1月1日 (満36歳)"></label>
    <label>性別 <input type="text" name="gender"></label>
    <label>携帯電話 <input type="text" name="cell_phone"></label>
    <label>E-mail <input type="text" name="email"></label>
    <label>証明写真
      <input type="file" id="photo-file" accept="image/*">
      <span class="hint">生成時にのみアップロードされます（下書き保存の対象外）。</span>
    </label>
  </section>

  <section>
    <h2>現住所・連絡先</h2>
    <label>ふりがな（現住所） <input type="text" name="address_kana"></label>
    <label>現住所 <input type="text" name="address"></label>
    <label>郵便番号（現住所） <input type="text" name="address_zip"></label>
    <label>電話番号（現住所） <input type="text" name="tel"></label>
    <label>FAX（現住所） <input type="text" name="fax"></label>
    <label>ふりがな（連絡先） <input type="text" name="address_kana2"></label>
    <label>連絡先住所 <input type="text" name="address2"></label>
    <label>郵便番号（連絡先） <input type="text" name="address_zip2"></label>
    <label>電話番号（連絡先） <input type="text" name="tel2"></label>
    <label>FAX（連絡先） <input type="text" name="fax2"></label>
  </section>

  <section>
    <h2>学位</h2>
    <label>学位 <input type="text" name="degree"></label>
    <label>取得年度 <input type="text" name="degree_year"></label>
    <label>授与機関 <input type="text" name="degree_affiliation"></label>
    <label>学位論文タイトル <input type="text" name="thesis_title"></label>
  </section>

  <section>
    <h2>学歴</h2>
    <div id="education-rows"></div>
    <button type="button" class="small" data-add-row="education">+ 学歴を追加</button>
  </section>

  <section>
    <h2>職歴</h2>
    <div id="experience-rows"></div>
    <button type="button" class="small" data-add-row="experience">+ 職歴を追加</button>
  </section>

  <section>
    <h2>免許・資格</h2>
    <div id="licences-rows"></div>
    <button type="button" class="small" data-add-row="licences">+ 資格を追加</button>
  </section>

  <section>
    <h2>主な受賞・表彰等</h2>
    <div id="awards-rows"></div>
    <button type="button" class="small" data-add-row="awards">+ 受賞を追加</button>
  </section>

  <section>
    <h2>その他</h2>
    <label>教育歴 <textarea name="teaching"></textarea></label>
    <label>所属学会 <textarea name="affiliated_society"></textarea></label>
    <label>その他特記事項 <textarea name="notices"></textarea></label>
    <label>通勤時間 <input type="text" name="commuting_time"></label>
    <label>扶養家族数（配偶者を除く） <input type="text" name="dependents"></label>
    <label>配偶者の有無 <input type="text" name="spouse"></label>
    <label>配偶者の扶養義務 <input type="text" name="supporting_spouse"></label>
    <label>趣味・特技 <textarea name="hobby"></textarea></label>
    <label>志望動機 <textarea name="motivation"></textarea></label>
    <label>本人希望記入欄 <textarea name="request"></textarea></label>
  </section>

  <section>
    <h2>出力</h2>
    <label>出力形式
      <select name="format">
        <option value="pdf">PDF</option>
        <option value="excel">Excel (.xlsx)</option>
        <option value="word">Word (.docx)</option>
      </select>
    </label>
    <button type="submit" class="primary">履歴書を生成してダウンロード</button>
    <span class="status" id="generate-status"></span>
  </section>
</form>

<template id="history-row-template">
  <div class="row" data-history-row>
    <div class="narrow"><input type="text" data-field="year" placeholder="年"></div>
    <div class="narrow"><input type="text" data-field="month" placeholder="月"></div>
    <div><input type="text" data-field="value" placeholder="内容"></div>
    <div class="narrow"><button type="button" class="small danger" data-remove-row>削除</button></div>
  </div>
</template>

<script src="/static/common.js"></script>
<script src="/static/rirekisho.js"></script>
</body>
</html>
